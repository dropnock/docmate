# Scrapes the backend's /metrics directly over the docker-compose network —
# never routed through nginx, never publicly exposed. See main.py's
# Instrumentator().instrument(app).expose(app) for what's served there.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: docmate-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
