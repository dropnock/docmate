# Tails every container's stdout/stderr via Docker service discovery — no
# per-service log-shipping config needed; this is what picks up nginx's
# default access/error logs and the backend's structured JSON alike.
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Container name, leading "/" stripped (e.g. "docmate-backend-1").
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      # docker-compose's own service label — stable across container-name
      # variations from different compose project names, so dashboards/
      # queries built against it (e.g. {service="backend"}) don't need to
      # know the exact project prefix.
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "service"
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: "stream"
