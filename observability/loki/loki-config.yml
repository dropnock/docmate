# Single-binary, filesystem-backed Loki — fits the single-VM docker-compose
# deployment this project runs on (see README's "Notes for Production").
# 30-day log retention via the compactor; adjust limits_config.retention_period
# to change it.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 720h
  # Loki's built-in defaults here (4MB/s rate, 6MB burst) are sized for a
  # small/dev deployment and were being hit in production — promtail's logs
  # showed repeated "429 ingestion rate limit exceeded ... limit: 4194304
  # bytes/sec" with ~1MB batches arriving every few seconds, meaning real
  # log lines were being dropped, not just delayed. Raised with headroom
  # over the observed burst pattern. per_stream_rate_limit is Loki's other,
  # separate per-container-stream cap (default 3MB/s, 15MB burst) — raised
  # too so a single noisy container can't hit that ceiling next.
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  per_stream_rate_limit: 8MB
  per_stream_rate_limit_burst: 32MB

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem
