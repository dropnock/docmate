server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Content-hashed filenames change on every build, so these are safe to
    # cache forever — browsers only ever refetch when the HTML's <script src>
    # actually points at a new hash.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html must never be cached, or browsers keep serving a stale
    # shell referencing JS/CSS files a new deploy has already removed —
    # exactly what silently broke Keycloak login after each rebuild tonight.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
