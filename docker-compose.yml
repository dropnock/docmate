services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docmate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docmate}
      POSTGRES_DB: ${POSTGRES_DB:-docmate}
      # Consumed by postgres-init/01-create-keycloak-db.sh to provision the
      # Keycloak role/database with the same credentials Keycloak itself uses.
      KC_DB_NAME: ${KC_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KC_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docmate}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    restart: unless-stopped
    command: start-dev --import-realm
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KC_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KC_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
      KC_HOSTNAME_URL: https://${AUTH_HOSTNAME:-auth.docmate.local}
      KC_HOSTNAME_ADMIN_URL: https://${AUTH_HOSTNAME:-auth.docmate.local}
      KC_HTTP_ENABLED: "true"
      # TLS terminates at nginx; the nginx->keycloak hop is plain http, so
      # Keycloak must trust nginx's X-Forwarded-* headers to know the
      # original request was https (needed for correct redirect URLs and
      # Secure cookie behavior).
      KC_PROXY: edge
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import:ro
    ports:
      - "8180:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        # See RELEASING.md — unset (dev/unknown defaults) for everyday local use.
        APP_VERSION: ${APP_VERSION:-dev}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      # Built into a safely-escaped connection string by
      # Settings.sqlalchemy_database_url — see backend/app/core/config.py.
      POSTGRES_USER: ${POSTGRES_USER:-docmate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docmate}
      POSTGRES_DB: ${POSTGRES_DB:-docmate}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_ENDPOINT_URL: http://minio:9000
      # Must be browser-resolvable — used only to build presigned URLs
      # returned to the client, never for backend→MinIO traffic. Defaults to
      # the same hostname nginx routes to MinIO under (S3_HOSTNAME) unless
      # S3_PUBLIC_URL is set explicitly (e.g. a different scheme/port).
      AWS_PUBLIC_ENDPOINT_URL: ${S3_PUBLIC_URL:-https://${S3_HOSTNAME:-s3.docmate.local}}
      AWS_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_EXTERNAL_URL: https://${AUTH_HOSTNAME:-auth.docmate.local}
      KEYCLOAK_ADMIN_USER: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      CUSTOMER_PORTAL_BASE_URL: ${CUSTOMER_PORTAL_BASE_URL:-https://docmate.local}
      # Comma-separated public base URLs for the digitizing portal — kept in
      # sync with the docmate-de Keycloak client's redirect URIs on startup.
      DE_PORTAL_BASE_URLS: ${DE_PORTAL_BASE_URLS:-https://www.docmate.local,https://digitizing.docmate.local}
      SEED_DEFAULT_PASSWORD: ${SEED_DEFAULT_PASSWORD:-changeme123}
    ports:
      - "8000:8000"

  frontend-de:
    build:
      context: ./frontend
      dockerfile: Dockerfile.digitizing
      args:
        # Baked into the JS bundle at build time by Vite — changing
        # AUTH_HOSTNAME in .env requires rebuilding this image, a plain
        # container recreate is not enough.
        VITE_KEYCLOAK_URL: https://${AUTH_HOSTNAME:-auth.docmate.local}
        # See RELEASING.md — unset (dev/unknown defaults) for everyday local use.
        VITE_APP_VERSION: ${APP_VERSION:-dev}
        VITE_GIT_COMMIT: ${GIT_COMMIT:-unknown}
    restart: unless-stopped
    ports:
      - "5173:80"

  frontend-cust:
    build:
      context: ./frontend
      dockerfile: Dockerfile.customer
      args:
        VITE_KEYCLOAK_URL: https://${AUTH_HOSTNAME:-auth.docmate.local}
        VITE_APP_VERSION: ${APP_VERSION:-dev}
        VITE_GIT_COMMIT: ${GIT_COMMIT:-unknown}
    restart: unless-stopped
    ports:
      - "5174:80"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend-de
      - frontend-cust
      - minio
    environment:
      # Rendered into nginx.conf from nginx.conf.template via the official
      # image's built-in envsubst-on-templates entrypoint step. The output
      # dir is overridden to /etc/nginx so it replaces nginx.conf itself
      # (the default only drops rendered files into conf.d/ fragments).
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
      DE_HOSTNAMES: ${DE_HOSTNAMES:-www.docmate.local digitizing.docmate.local}
      AUTH_HOSTNAME: ${AUTH_HOSTNAME:-auth.docmate.local}
      CUSTOMER_DOMAIN: ${CUSTOMER_DOMAIN:-docmate.local}
      S3_HOSTNAME: ${S3_HOSTNAME:-s3.docmate.local}
    ports:
      - "80:80"      # Digitizing Entity portal
      - "443:443"    # TLS (required for Keycloak's Secure session cookie)
      - "8080:8080"  # Customer portal
    volumes:
      - ./nginx/templates/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./nginx/certs:/etc/nginx/certs:ro

volumes:
  postgres_data:
  minio_data:
