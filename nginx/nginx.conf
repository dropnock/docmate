events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ── Digitizing Entity Portal ───────────────────────────────────────────────
    server {
        listen 80;
        server_name www.docmate.local digitizing.docmate.local localhost;

        proxy_set_header X-Portal "digitizing";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        location /api/ {
            proxy_pass http://backend:8000;
        }

        location / {
            proxy_pass http://frontend-de:80;
        }
    }

    # ── Keycloak ───────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name auth.docmate.local;

        location / {
            proxy_pass http://keycloak:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffer_size          128k;
            proxy_buffers              4 256k;
            proxy_busy_buffers_size    256k;
        }
    }

    # ── Protect www and auth on port 8080 ─────────────────────────────────────
    # Exact names always beat the customer wildcard regex below.
    server {
        listen 8080;
        server_name www.docmate.local auth.docmate.local;
        return 444;
    }

    # ── Customer wildcard ──────────────────────────────────────────────────────
    # Any *.docmate.local subdomain not matched above → customer portal.
    server {
        listen 80;
        listen 8080;
        server_name ~^(?<subdomain>[^.]+)\.docmate\.local$;

        proxy_set_header X-Portal "customer";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        location /api/ {
            proxy_pass http://backend:8000;
        }

        location / {
            proxy_pass http://frontend-cust:80;
        }
    }
}
