events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ── Digitizing Entity Portal ───────────────────────────────────────────────
    # Accessible at: http://digitizing.docmate.local  OR  http://localhost:80
    server {
        listen 80;
        server_name digitizing.docmate.local localhost;

        # Inject portal header so the backend can enforce it independently of JWT
        proxy_set_header X-Portal "digitizing";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        location /api/ {
            proxy_pass http://backend:8000;
        }

        location / {
            proxy_pass http://frontend-de:80;
        }
    }

    # ── Customer Portal ────────────────────────────────────────────────────────
    # Accessible at: http://customer.docmate.local  OR  http://localhost:8080
    server {
        listen 8080;
        server_name customer.docmate.local;

        proxy_set_header X-Portal "customer";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        location /api/ {
            proxy_pass http://backend:8000;
        }

        location / {
            proxy_pass http://frontend-cust:80;
        }
    }
}
